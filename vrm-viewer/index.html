<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Open-LLM-VTuber (VRM)</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #1a1a2e; overflow: hidden; font-family: 'Segoe UI', sans-serif; }
    canvas { display: block; }

    #ui-overlay {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      pointer-events: none; z-index: 10;
    }
    #status-bar {
      position: absolute; top: 16px; left: 50%; transform: translateX(-50%);
      background: rgba(0,0,0,0.55); color: #e0e0e0; padding: 6px 18px;
      border-radius: 20px; font-size: 13px; backdrop-filter: blur(6px);
      border: 1px solid rgba(255,255,255,0.12);
    }
    #chat-bubble {
      position: absolute; bottom: 120px; left: 50%; transform: translateX(-50%);
      max-width: 520px; width: 90%;
      background: rgba(10,10,30,0.82); color: #f0f0f0;
      padding: 14px 20px; border-radius: 16px; font-size: 15px; line-height: 1.55;
      backdrop-filter: blur(8px); border: 1px solid rgba(255,255,255,0.14);
      transition: opacity 0.4s;
    }
    #chat-bubble .speaker { font-size: 11px; color: #9aa0c0; margin-bottom: 4px; }
    #chat-bubble.hidden { opacity: 0; pointer-events: none; }
    #controls {
      position: absolute; bottom: 32px; left: 50%; transform: translateX(-50%);
      display: flex; gap: 12px; pointer-events: all;
    }
    .btn {
      padding: 10px 22px; border-radius: 24px; border: none; cursor: pointer;
      font-size: 14px; font-weight: 600; transition: all 0.2s;
    }
    #mic-btn { background: #5c6bc0; color: white; box-shadow: 0 4px 14px rgba(92,107,192,0.4); }
    #mic-btn:hover:not(.disabled) { background: #7986cb; transform: translateY(-1px); }
    #mic-btn.recording { background: #e53935; box-shadow: 0 4px 14px rgba(229,57,53,0.4); }
    #mic-btn.disabled { background: #444; color: #888; cursor: not-allowed; }
    #loading-screen {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: #1a1a2e; display: flex; flex-direction: column;
      align-items: center; justify-content: center; z-index: 100; color: white;
    }
    #loading-screen h2 { margin-bottom: 12px; font-size: 18px; color: #9aa0c0; }
    .spinner {
      width: 44px; height: 44px; border: 4px solid rgba(255,255,255,0.15);
      border-top-color: #5c6bc0; border-radius: 50%;
      animation: spin 0.9s linear infinite; margin-bottom: 16px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    #loading-screen.hidden { display: none; }
    #hint {
      position: absolute; bottom: 80px; left: 50%; transform: translateX(-50%);
      color: #555; font-size: 11px;
    }
  </style>
</head>
<body>

<div id="loading-screen">
  <div class="spinner"></div>
  <h2 id="loading-msg">Connecting to server...</h2>
</div>

<div id="ui-overlay">
  <div id="status-bar">Connecting...</div>
  <div id="chat-bubble" class="hidden">
    <div class="speaker" id="speaker-name">AI</div>
    <div id="chat-text"></div>
  </div>
  <div id="controls">
    <button class="btn disabled" id="mic-btn">🎤 Hold to Speak</button>
  </div>
  <div id="hint">Hold SPACE or the button to speak</div>
</div>

<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/",
    "@pixiv/three-vrm": "https://cdn.jsdelivr.net/npm/@pixiv/three-vrm@3.3.0/lib/three-vrm.module.min.js"
  }
}
</script>

<script type="module">
import * as THREE from 'three';
import { GLTFLoader }    from 'three/addons/loaders/GLTFLoader.js';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { VRMLoaderPlugin, VRMUtils } from '@pixiv/three-vrm';

// ── Config ────────────────────────────────────────────────────────────────────
const WS_URL    = `ws://${location.hostname}:${location.port || 12393}/client-ws`;
const CLIENT_UID = 'vrm-' + Math.random().toString(36).slice(2, 10);

// ── Three.js renderer ─────────────────────────────────────────────────────────
const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setPixelRatio(window.devicePixelRatio);
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.outputColorSpace = THREE.SRGBColorSpace;
document.body.insertBefore(renderer.domElement, document.getElementById('ui-overlay'));

const scene  = new THREE.Scene();
scene.background = new THREE.Color(0x1a1a2e);

const camera = new THREE.PerspectiveCamera(30, window.innerWidth / window.innerHeight, 0.1, 50);
camera.position.set(0, 1.3, 3.5);

const controls = new OrbitControls(camera, renderer.domElement);
controls.target.set(0, 1.0, 0);
controls.enableDamping = true;
controls.dampingFactor = 0.07;
controls.update();

// Lighting
scene.add(new THREE.AmbientLight(0xffffff, 1.2));
const dirLight = new THREE.DirectionalLight(0xffffff, 1.8);
dirLight.position.set(1.5, 2.5, 2);
scene.add(dirLight);
const fillLight = new THREE.DirectionalLight(0x8090ff, 0.6);
fillLight.position.set(-2, 1, -1);
scene.add(fillLight);

window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

// ── VRM state ─────────────────────────────────────────────────────────────────
let vrm = null;
let blinkTimer = 0;
let mouthOpenness = 0;
let currentVolumes = [];
let lastVolumeTime = 0;

const gltfLoader = new GLTFLoader();
gltfLoader.register(parser => new VRMLoaderPlugin(parser));

async function loadVRM(url) {
  if (vrm) {
    scene.remove(vrm.scene);
    VRMUtils.deepDispose(vrm.scene);
    vrm = null;
  }
  const gltf = await gltfLoader.loadAsync(url);
  vrm = gltf.userData.vrm;
  if (!vrm) throw new Error('No VRM data in file. Is this a valid .vrm file?');
  VRMUtils.removeUnnecessaryJoints(vrm.scene);
  vrm.scene.rotation.y = Math.PI; // face forward
  scene.add(vrm.scene);

  // Auto-fit camera
  const box = new THREE.Box3().setFromObject(vrm.scene);
  const center = box.getCenter(new THREE.Vector3());
  const size   = box.getSize(new THREE.Vector3());
  controls.target.copy(center);
  camera.position.set(center.x, center.y + size.y * 0.1, size.y * 1.9);
  controls.update();
}

function applyExpressions(names) {
  if (!vrm?.expressionManager) return;
  // Reset all presets
  for (const p of ['happy','angry','sad','surprised','relaxed','neutral',
                   'blink','blinkLeft','blinkRight']) {
    try { vrm.expressionManager.setValue(p, 0); } catch (_) {}
  }
  for (const name of (names || [])) {
    try { vrm.expressionManager.setValue(name, 1.0); } catch (_) {}
  }
}

function clearExpressions() { applyExpressions([]); }

// ── Render loop ───────────────────────────────────────────────────────────────
const clock = new THREE.Clock();
function animate() {
  requestAnimationFrame(animate);
  const delta = clock.getDelta();
  controls.update();

  if (vrm) {
    // Lip sync
    if (currentVolumes.length > 0) {
      const elapsed = performance.now() - lastVolumeTime;
      const idx = Math.min(Math.floor(elapsed / 20), currentVolumes.length - 1);
      mouthOpenness = currentVolumes[idx] * 0.9;
    } else {
      mouthOpenness *= 0.82;
    }
    try { vrm.expressionManager.setValue('aa', mouthOpenness); } catch (_) {}

    // Auto blink
    blinkTimer += delta;
    const phase = blinkTimer % (3.5 + Math.sin(blinkTimer * 0.3) * 1.5);
    const blinkVal = phase < 0.08 ? Math.sin((phase / 0.08) * Math.PI) : 0;
    try { vrm.expressionManager.setValue('blink', blinkVal); } catch (_) {}

    vrm.update(delta);
  }
  renderer.render(scene, camera);
}
animate();

// ── Audio queue ───────────────────────────────────────────────────────────────
let audioCtx  = null;
let audioQueue = [];
let isPlaying  = false;

function ensureAudioCtx() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  if (audioCtx.state === 'suspended') audioCtx.resume();
}

async function decodeAudioPayload(payload) {
  if (!payload.audio) return null;
  ensureAudioCtx();
  const raw   = atob(payload.audio);
  const bytes = new Uint8Array(raw.length);
  for (let i = 0; i < raw.length; i++) bytes[i] = raw.charCodeAt(i);
  return audioCtx.decodeAudioData(bytes.buffer);
}

async function enqueuePayload(payload) {
  ensureAudioCtx();
  let audioBuf = null;
  try { audioBuf = await decodeAudioPayload(payload); } catch (e) { console.warn('Decode:', e); }

  const actions = payload.actions || {};
  audioQueue.push({
    audioBuf,
    volumes:     payload.volumes || [],
    expressions: Array.isArray(actions.expressions) ? actions.expressions : [],
    displayText: payload.display_text || null,
  });
  playNext();
}

function playNext() {
  if (isPlaying || audioQueue.length === 0) return;
  isPlaying = true;
  const item = audioQueue.shift();

  // Show text
  if (item.displayText) {
    showChat(item.displayText.name || 'AI', item.displayText.text || '');
  }
  // Apply expressions
  if (item.expressions.length > 0) applyExpressions(item.expressions);

  const done = () => {
    currentVolumes = [];
    mouthOpenness  = 0;
    isPlaying = false;
    clearExpressions();
    if (audioQueue.length === 0 && ws?.readyState === WebSocket.OPEN) {
      ws.send(JSON.stringify({ type: 'frontend-playback-complete' }));
    }
    playNext();
  };

  if (!item.audioBuf) {
    setTimeout(done, 400);
    return;
  }

  currentVolumes = item.volumes;
  lastVolumeTime = performance.now();

  ensureAudioCtx();
  const src = audioCtx.createBufferSource();
  src.buffer = item.audioBuf;
  src.connect(audioCtx.destination);
  src.onended = done;
  src.start();
}

// ── UI helpers ────────────────────────────────────────────────────────────────
const statusBar    = document.getElementById('status-bar');
const chatBubble   = document.getElementById('chat-bubble');
const chatText     = document.getElementById('chat-text');
const speakerName  = document.getElementById('speaker-name');
const micBtn       = document.getElementById('mic-btn');
const loadingScreen = document.getElementById('loading-screen');
const loadingMsg   = document.getElementById('loading-msg');

const setStatus  = (t) => { statusBar.textContent = t; };
const setLoading = (t) => { loadingMsg.textContent = t; };

function showChat(name, text) {
  speakerName.textContent = name || 'AI';
  chatText.textContent    = text;
  chatBubble.classList.remove('hidden');
}
function hideChat() { chatBubble.classList.add('hidden'); }

function enableMic() {
  micBtn.classList.remove('disabled');
}
function disableMic() {
  micBtn.classList.add('disabled');
}

// ── WebSocket ─────────────────────────────────────────────────────────────────
let ws = null;

function connect() {
  setStatus('Connecting...');
  ws = new WebSocket(WS_URL);

  ws.onopen = () => {
    setStatus('Connected — waiting for model...');
    ws.send(JSON.stringify({ type: 'request-init-config', client_uid: CLIENT_UID }));
  };

  ws.onclose = () => {
    setStatus('Disconnected — retrying in 3s...');
    setTimeout(connect, 3000);
  };

  ws.onerror = (e) => console.error('WS error', e);

  ws.onmessage = async (ev) => {
    let msg;
    try { msg = JSON.parse(ev.data); } catch { return; }

    switch (msg.type) {

      case 'set-model-and-conf': {
        const info = msg.model_info;
        if (info?.url) {
          setLoading(`Loading ${info.name || 'VRM'}...`);
          try {
            await loadVRM(info.url);
            loadingScreen.classList.add('hidden');
            setStatus('Ready — hold SPACE or the button to speak');
            enableMic();
          } catch (e) {
            setLoading('Failed to load VRM: ' + e.message);
            console.error(e);
          }
        }
        break;
      }

      case 'audio':
        await enqueuePayload(msg);
        break;

      case 'full-text':
        if (msg.text) {
          setStatus(msg.text);
          if (msg.text === 'Thinking...') hideChat();
        }
        break;

      case 'control':
        if (msg.text === 'start-mic') {
          enableMic();
        } else if (msg.text === 'conversation-chain-start') {
          setStatus('Thinking...');
          disableMic();
        } else if (msg.text === 'conversation-chain-end') {
          setStatus('Ready');
          enableMic();
        } else if (msg.text === 'interrupt') {
          audioQueue = [];
          currentVolumes = [];
          isPlaying = false;
          clearExpressions();
        }
        break;

      case 'user-input-transcription':
        if (msg.text) showChat('You', msg.text);
        break;

      case 'heartbeat':
        ws.send(JSON.stringify({ type: 'heartbeat-ack' }));
        break;

      case 'error':
        console.error('Server error:', msg.message);
        setStatus('Error: ' + (msg.message || 'unknown'));
        break;
    }
  };
}

// ── Microphone (push-to-talk) ─────────────────────────────────────────────────
let mediaRecorder = null;
let audioChunks   = [];
let micStream     = null;
let isRecording   = false;

async function startRec() {
  if (micBtn.classList.contains('disabled') || isRecording) return;
  ensureAudioCtx();
  try {
    micStream = await navigator.mediaDevices.getUserMedia({ audio: true });
  } catch {
    setStatus('Microphone access denied');
    return;
  }
  audioChunks   = [];
  mediaRecorder = new MediaRecorder(micStream);
  mediaRecorder.ondataavailable = (e) => { if (e.data.size > 0) audioChunks.push(e.data); };
  mediaRecorder.start(100);
  isRecording = true;
  micBtn.classList.add('recording');
  micBtn.textContent = '🔴 Recording...';
  setStatus('Listening...');
}

async function stopRec() {
  if (!isRecording || !mediaRecorder) return;
  isRecording = false;

  await new Promise(r => { mediaRecorder.onstop = r; mediaRecorder.stop(); });
  micStream.getTracks().forEach(t => t.stop());

  micBtn.classList.remove('recording');
  micBtn.textContent = '🎤 Hold to Speak';
  setStatus('Processing...');

  const blob = new Blob(audioChunks, { type: 'audio/webm' });
  const buf  = await blob.arrayBuffer();
  ensureAudioCtx();
  let floats;
  try {
    const decoded = await audioCtx.decodeAudioData(buf);
    floats = Array.from(decoded.getChannelData(0));
  } catch (e) {
    setStatus('Audio decode error'); return;
  }

  if (ws?.readyState === WebSocket.OPEN) {
    ws.send(JSON.stringify({ type: 'mic-audio-data',  audio: floats }));
    ws.send(JSON.stringify({ type: 'mic-audio-end', client_uid: CLIENT_UID }));
  }
}

micBtn.addEventListener('mousedown',  (e) => { e.preventDefault(); startRec(); });
micBtn.addEventListener('mouseup',    (e) => { e.preventDefault(); stopRec(); });
micBtn.addEventListener('mouseleave', (e) => { if (isRecording) stopRec(); });
micBtn.addEventListener('touchstart', (e) => { e.preventDefault(); startRec(); }, { passive: false });
micBtn.addEventListener('touchend',   (e) => { e.preventDefault(); stopRec(); },  { passive: false });

document.addEventListener('keydown', (e) => { if (e.code === 'Space' && !e.repeat) { e.preventDefault(); startRec(); } });
document.addEventListener('keyup',   (e) => { if (e.code === 'Space') stopRec(); });

// ── Boot ──────────────────────────────────────────────────────────────────────
connect();
</script>
</body>
</html>
